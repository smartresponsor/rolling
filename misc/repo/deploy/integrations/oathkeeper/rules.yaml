# examples for Ory Oathkeeper
# Forward all requests to backend if remote authorizer says allow
- id: role-check
  upstream:
    preserve_host: true
    url: http://backend:8080
  match:
    url: <http|https>://<.*>
    methods: [ "GET","POST","PUT","DELETE","PATCH" ]
  authenticators:
    - handler: noop
  authorizer:
    handler: remote_json
    config:
      remote: http://adapter-http:8081/check
      # adapter-http is a simple HTTP shim you can implement to call /v2/check or local logic
  mutators:
    - handler: header
      config:
        headers:
          x-role-audit: "on"
