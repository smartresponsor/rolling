services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\Rolling\Controller\:
    resource: '../src/Controller/'
    tags: [ 'controller.service_arguments' ]

  App\Rolling\Command\:
    resource: '../src/Command/'

  App\Rolling\Infrastructure\Observability\Metrics\:
    resource: '../src/Infrastructure/Observability/Metrics/'


  App\Rolling\Service\:
    resource: '../src/Service/'

  App\Rolling\Infrastructure\Rebac\InMemoryTupleStore: ~
  App\Rolling\InfrastructureInterface\Rebac\TupleStoreInterface: '@App\Rolling\Infrastructure\Rebac\InMemoryTupleStore'

  App\Rolling\Integration\Symfony\DemoPdpV2: ~

  App\Rolling\ServiceInterface\Policy\PdpV2Interface: '@App\Rolling\Integration\Symfony\DemoPdpV2'
