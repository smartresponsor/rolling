  App\Observability\Role\Metrics\:
    resource: '../src/Observability/Role/Metrics/'

  App\Integration\Symfony\DemoPdpV2: ~

  PolicyInterface\Role\PdpV2Interface: '@App\Integration\Symfony\DemoPdpV2'
