services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\Integration\Symfony\Controller\:
    resource: '../src/Integration/Symfony/Controller/'
    tags: [ 'controller.service_arguments' ]

  App\Controller\:
    resource: '../src/Controller/'
    tags: [ 'controller.service_arguments' ]

  App\Command\:
